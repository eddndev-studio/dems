name: dems_mobile
description: "Plataforma de evaluación IPN-DEMS — Flutter client (offline-first)."
publish_to: 'none'
version: 0.3.0+4

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.2
  riverpod_annotation: ^3.0.2

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local storage (offline-first)
  drift: ^2.20.2
  # SQLite cifrado (SQLCipher) para la BD local en plataformas nativas.
  # Sustituye a sqlite3_flutter_libs: SQLCipher ya provee un sqlite3 completo
  # (con cifrado). Tener ambos provocaría colisión de símbolos sqlite3_* en
  # desktop, donde podría resolverse el sqlite3 SIN cifrado.
  sqlcipher_flutter_libs: ^0.6.8
  # Uso directo de `package:sqlite3/open.dart` para apuntar a SQLCipher.
  sqlite3: ^2.4.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Secure storage (JWT tokens)
  flutter_secure_storage: ^9.2.2

  # Connectivity
  connectivity_plus: ^6.1.0

  # Utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.0

  # Typography (premium fonts — Plus Jakarta Sans, Space Grotesk)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Mock en memoria de FlutterSecureStorage para los tests del refresh 401.
  flutter_secure_storage_platform_interface: ^1.1.2

  # Codegen (versiones alineadas con analyzer 7.x / Dart 3.10)
  build_runner: ^2.9.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^3.0.2
  drift_dev: ^2.28.4
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.2

flutter:
  uses-material-design: true
