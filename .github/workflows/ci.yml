name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (rust + postgres)
    runs-on: [self-hosted, vps2]
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dems
          POSTGRES_PASSWORD: dems
          POSTGRES_DB: dems
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://dems:dems@localhost:5433/dems
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api -> target

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --locked

      - name: openapi.json in sync
        run: |
          tmp=$(mktemp)
          cargo run --quiet --bin openapi-export -- "$tmp"
          if ! diff -q "$tmp" ../../packages/shared/openapi.json > /dev/null; then
            echo "::error::openapi.json out of sync — run 'just openapi-export' and commit."
            diff -u ../../packages/shared/openapi.json "$tmp" | head -60
            exit 1
          fi

  mobile:
    name: mobile (flutter)
    runs-on: [self-hosted, vps2]
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

  deploy:
    name: deploy (vps2)
    needs: [api, mobile]
    # Solo en push a main (tras merge), nunca en PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, vps2]

    steps:
      - uses: actions/checkout@v4

      # El runner corre en VPS2 → deploy local. /opt/dems es propiedad de
      # github-runner; deploy/.env (secrets) persiste y se excluye del sync.
      - name: Sync source to /opt/dems
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'deploy/.env' \
            --exclude 'apps/mobile' \
            --exclude 'target' \
            "$GITHUB_WORKSPACE"/ /opt/dems/

      - name: Build image & restart stack
        working-directory: /opt/dems/deploy
        run: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 http://127.0.0.1:8090/readyz | grep -q '"db":true'; then
              echo "API healthy after deploy"; exit 0
            fi
            echo "waiting for API... ($i)"; sleep 3
          done
          echo "::error::API did not become healthy after deploy"
          docker logs dems-api --tail 80 || true
          exit 1
