name: release-app

# Compila la app Flutter en release apuntando a PRODUCCIÓN
# (--dart-define=API_BASE_URL gana sobre cualquier default de env.dart).
#
# Disparadores:
#   - push de un tag `v*`  -> compila y crea un GitHub Release con los artefactos.
#   - manual (workflow_dispatch) -> compila y sube los artefactos al run.
#
# FIRMA: el buildType release usa el signingConfig "release" si existe key.properties,
# y cae a la llave debug si no (ver apps/mobile/android/app/build.gradle.kts).
# Para FIRMA REAL (Play Store / updates in-place), sube estos secrets en GitHub:
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD.
# El paso "Materializar keystore" de abajo decodifica el keystore y escribe key.properties
# automáticamente cuando el secret existe; sin secrets, el build sigue firmando con debug.
#   Generar keystore + base64:
#     keytool -genkeypair -v -keystore dems-release.jks -keyalg RSA -keysize 2048 \
#       -validity 10000 -alias dems
#     base64 -w0 dems-release.jks   # -> pega el resultado en ANDROID_KEYSTORE_BASE64

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name (ej. 1.0.0). Vacío = usa pubspec."
        required: false
        default: ""
      build_number:
        description: "Build number (entero). Vacío = usa el run number."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  API_BASE_URL: https://dems.eddndev.work
  # Espejo de los secrets a env para poder usarlos en `if:` (el contexto secrets
  # no está disponible en condicionales; env sí).
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

jobs:
  build:
    name: build release (android + web)
    # GitHub-hosted: el self-hosted cancelaba el build de APK por contención;
    # ubuntu-latest trae el Android SDK preinstalado (ANDROID_HOME ya seteado).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Materializar keystore Android (si hay secrets)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/dems-release.jks"
          cat > android/key.properties <<EOF
          storeFile=$RUNNER_TEMP/dems-release.jks
          storePassword=$KS_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
          echo "key.properties escrito — el build firmará con el keystore release."

      - name: Derivar versión
        id: ver
        run: |
          name="${{ github.event.inputs.build_name }}"
          if [ -z "$name" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            name="${GITHUB_REF_NAME#v}"
          fi
          num="${{ github.event.inputs.build_number }}"
          [ -z "$num" ] && num="${{ github.run_number }}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "num=$num" >> "$GITHUB_OUTPUT"
          echo "build-name='${name:-<pubspec>}'  build-number='$num'"

      - name: flutter pub get
        run: flutter pub get

      - name: Code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release)
        run: |
          args="--release --dart-define=API_BASE_URL=$API_BASE_URL"
          [ -n "${{ steps.ver.outputs.name }}" ] && args="$args --build-name=${{ steps.ver.outputs.name }}"
          [ -n "${{ steps.ver.outputs.num }}" ] && args="$args --build-number=${{ steps.ver.outputs.num }}"
          echo "flutter build apk $args"
          flutter build apk $args

      - name: Build App Bundle (release)
        run: |
          args="--release --dart-define=API_BASE_URL=$API_BASE_URL"
          [ -n "${{ steps.ver.outputs.name }}" ] && args="$args --build-name=${{ steps.ver.outputs.name }}"
          [ -n "${{ steps.ver.outputs.num }}" ] && args="$args --build-number=${{ steps.ver.outputs.num }}"
          flutter build appbundle $args

      - name: Build web (release)
        run: flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Empaquetar web
        run: tar -czf build/dems-web.tar.gz -C build/web .

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: dems-release-${{ github.run_number }}
          path: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/bundle/release/app-release.aab
            apps/mobile/build/dems-web.tar.gz
          if-no-files-found: error

      - name: Crear GitHub Release (solo en tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: DEMS app ${{ github.ref_name }}
          body: |
            App DEMS — release ${{ github.ref_name }} (API → https://dems.eddndev.work).

            Firma: keystore **release** si están los secrets de firma; de lo contrario,
            llave **debug** (sideload OK; Play Store / updates in-place requieren el
            keystore propio — ver cabecera del workflow).
          files: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/bundle/release/app-release.aab
            apps/mobile/build/dems-web.tar.gz
