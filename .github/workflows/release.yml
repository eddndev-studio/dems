name: release-app

# Compila la app Flutter en release apuntando a PRODUCCIÓN
# (--dart-define=API_BASE_URL gana sobre cualquier default de env.dart).
#
# Disparadores:
#   - push de un tag `v*`  -> compila y crea un GitHub Release con los artefactos.
#   - manual (workflow_dispatch) -> compila y sube los artefactos al run.
#
# FIRMA (mismo patrón que ataulfo-app): corre en VPS2 (self-hosted). El keystore y
# sus contraseñas viven en repo SECRETS; el paso "Restaurar keystore de release"
# materializa key.properties + .jks en el workspace antes de compilar y el paso
# "Limpiar material de firma" los borra al final. build.gradle.kts firma el release
# leyendo apps/mobile/android/key.properties (cae a debug sólo en build local sin él).
# SECRETS REQUERIDOS (Settings → Secrets and variables → Actions → Secrets):
#   ANDROID_KEYSTORE_BASE64    el .jks en base64:  base64 -w0 mi-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD  contraseña del store
#   ANDROID_KEY_ALIAS          alias de la llave
#   ANDROID_KEY_PASSWORD       contraseña de la llave

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name (ej. 1.0.0). Vacío = usa pubspec."
        required: false
        default: ""
      build_number:
        description: "Build number (entero). Vacío = usa el run number."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  API_BASE_URL: https://dems.eddndev.work
  ANDROID_SDK_ROOT: /opt/android-sdk
  ANDROID_HOME: /opt/android-sdk

jobs:
  build:
    name: build release (android + web)
    # En VPS2 (self-hosted): aquí viven el keystore de firma y el Android SDK.
    runs-on: [self-hosted, vps2]
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Apuntar Flutter al SDK de Android del runner
        run: flutter config --android-sdk "$ANDROID_SDK_ROOT"

      # Mismo patrón que ataulfo-app: el keystore + contraseñas viven en repo
      # Secrets (cifrados). Se materializan key.properties + .jks en el workspace
      # y se borran al final (el workspace self-hosted persiste entre runs).
      - name: Restaurar keystore de release (firma)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error title=Falta el keystore::Define el secret ANDROID_KEYSTORE_BASE64 (+ _PASSWORD/_KEY_PASSWORD/_KEY_ALIAS) — mismo patrón que ataulfo-app. Sin él no se firma el release."
            exit 1
          fi
          KS="$GITHUB_WORKSPACE/apps/mobile/android/app/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KS"
          {
            echo "storeFile=$KS"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties
          echo "key.properties + keystore restaurados — firma de release lista."

      - name: Derivar versión
        id: ver
        run: |
          name="${{ github.event.inputs.build_name }}"
          if [ -z "$name" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            name="${GITHUB_REF_NAME#v}"
          fi
          num="${{ github.event.inputs.build_number }}"
          [ -z "$num" ] && num="${{ github.run_number }}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "num=$num" >> "$GITHUB_OUTPUT"
          echo "build-name='${name:-<pubspec>}'  build-number='$num'"

      - name: flutter pub get
        run: flutter pub get

      - name: Code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release)
        run: |
          args="--release --dart-define=API_BASE_URL=$API_BASE_URL"
          [ -n "${{ steps.ver.outputs.name }}" ] && args="$args --build-name=${{ steps.ver.outputs.name }}"
          [ -n "${{ steps.ver.outputs.num }}" ] && args="$args --build-number=${{ steps.ver.outputs.num }}"
          echo "flutter build apk $args"
          flutter build apk $args

      - name: Build App Bundle (release)
        run: |
          args="--release --dart-define=API_BASE_URL=$API_BASE_URL"
          [ -n "${{ steps.ver.outputs.name }}" ] && args="$args --build-name=${{ steps.ver.outputs.name }}"
          [ -n "${{ steps.ver.outputs.num }}" ] && args="$args --build-number=${{ steps.ver.outputs.num }}"
          flutter build appbundle $args

      - name: Build web (release)
        run: flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Empaquetar web
        run: tar -czf build/dems-web.tar.gz -C build/web .

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: dems-release-${{ github.run_number }}
          path: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/bundle/release/app-release.aab
            apps/mobile/build/dems-web.tar.gz
          if-no-files-found: error

      - name: Crear GitHub Release (solo en tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: DEMS app ${{ github.ref_name }}
          body: |
            App DEMS — release ${{ github.ref_name }} (API → https://dems.eddndev.work).

            Firmado con el keystore de release (desde repo Secrets, igual que
            ataulfo-app). Apto para distribución / updates in-place.
          files: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/bundle/release/app-release.aab
            apps/mobile/build/dems-web.tar.gz

      - name: Limpiar material de firma del workspace
        if: always()
        run: |
          rm -f "$GITHUB_WORKSPACE/apps/mobile/android/app/upload-keystore.jks" \
                "$GITHUB_WORKSPACE/apps/mobile/android/key.properties"
