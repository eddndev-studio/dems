name: build-binaries

# Compila los binarios nativos del API (Windows y Linux) y los deja descargables:
#   - workflow_dispatch -> artefactos del run (Actions → run → Artifacts).
#   - push de tag v*     -> además se adjuntan al GitHub Release.
#
# El binario de Windows se cross-compila desde el runner Linux (vps2) con cargo-xwin
# (clang + lld ya presentes en el runner). dems-api.exe trae las migraciones embebidas
# y se autoaplica al arrancar.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # adjuntar binarios al Release en tags

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: API binaries (Windows x64)
    # MSVC nativo en runner hospedado: sin cargo-xwin/clang-cl (más fiable que
    # cross-compilar en el self-hosted, que tiene un rust-wrapper que rompe rustc).
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api -> target

      - name: Compilar dems-api.exe + seed.exe
        working-directory: apps/api
        run: cargo build --release --bin dems-api --bin seed

      - name: Ensamblar bundle de Windows
        run: |
          $B = "dist/dems-windows-server"
          New-Item -ItemType Directory -Force -Path $B | Out-Null
          Copy-Item apps/api/target/release/dems-api.exe $B
          Copy-Item apps/api/target/release/seed.exe $B
          Copy-Item deploy/windows/setup-db.bat,deploy/windows/run-server.bat,deploy/windows/seed-db.bat,deploy/windows/instalar-postgres.bat,deploy/windows/LEEME-Windows.md $B
          $jwt = -join ((1..64) | ForEach-Object { '{0:x}' -f (Get-Random -Maximum 16) })
          (Get-Content deploy/windows/.env.example -Raw) -replace '__GENERA_UN_VALOR_ALEATORIO__', $jwt | Set-Content "$B/.env"
          Compress-Archive -Path $B -DestinationPath dist/dems-windows-server.zip -Force
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: dems-windows-server
          path: dist/dems-windows-server.zip
          if-no-files-found: error

      - name: Adjuntar al Release (en tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dems-windows-server.zip

  linux:
    name: API binary (Linux x64)
    runs-on: [self-hosted, vps2]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api -> target

      - name: Compilar dems-api + seed (Linux)
        working-directory: apps/api
        run: cargo build --release --bin dems-api --bin seed

      - name: Empaquetar
        run: |
          mkdir -p dist
          tar -czf dist/dems-api-linux-x64.tar.gz -C apps/api/target/release dems-api seed

      - uses: actions/upload-artifact@v4
        with:
          name: dems-api-linux-x64
          path: dist/dems-api-linux-x64.tar.gz
          if-no-files-found: error

      - name: Adjuntar al Release (en tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dems-api-linux-x64.tar.gz
