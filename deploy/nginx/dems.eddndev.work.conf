# DEMS API — dems.eddndev.work
# Reverse proxy → dems-api container (127.0.0.1:8090).
# Plain HTTP block; `certbot --nginx -d dems.eddndev.work` adds the :443 server
# block + the 80→443 redirect.
server {
    server_name dems.eddndev.work;

    # Memoria técnica / multipart uploads.
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/dems.access.log;
    error_log  /var/log/nginx/dems.error.log;

    listen 80;
    listen [::]:80;
}
