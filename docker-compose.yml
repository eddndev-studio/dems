services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: dems-postgres
    environment:
      POSTGRES_USER: dems
      POSTGRES_PASSWORD: dems
      POSTGRES_DB: dems
    ports:
      - "5433:5432"
    volumes:
      - dems_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dems -d dems"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dems_pgdata:
